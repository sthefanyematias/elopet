
<app-header-admin></app-header-admin>

<section class="pagina-lista">
    <div class="painel">

        <div class="painel-topo">
            <h1>Editar Pet</h1>
        </div>
        <p class="subtitulo">Selecione o pet que deseja editar.</p>
        <hr class="divisor">

        <div class="loading-state" *ngIf="carregando">
            <div class="spinner"></div>
            <p>Carregando pets...</p>
        </div>

        <div class="sem-dados" *ngIf="!carregando && pets.length === 0">
            <span class="material-icons">pets</span>
            <p>Nenhum pet cadastrado ainda.</p>
        </div>

        <div class="grid-cards" *ngIf="!carregando && pets.length > 0">
            <div class="card-admin" *ngFor="let pet of pets">
                <div class="card-img-wrapper">
                    <img [src]="getImagem(pet.imagem)" [alt]="pet.nome" loading="lazy">
                </div>
                <div class="card-body">
                    <div class="card-badges">
                        <span class="badge azul">{{ pet.especie }}</span>
                        <span class="badge laranja">{{ pet.porte }}</span>
                    </div>
                    <h3>{{ pet.nome }}</h3>
                    <p>{{ pet.sexo }} • {{ pet.idade }} ano(s)</p>
                    <button class="btn-acao-card editar" [routerLink]="['/admin/cadastrar', pet.id]">
                        <span class="material-icons">edit</span> Editar
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<app-footer-admin></app-footer-admin>
