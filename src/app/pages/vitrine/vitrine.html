
<section class="vitrine-header">
    <div class="container">
        <h1>Encontre seu novo amigo</h1>
        <div class="header-divider"></div>
    </div>
    <div class="wave-divider">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#fff5ed"
                d="M0,160L60,170.7C120,181,240,203,360,218.7C480,235,600,245,720,229.3C840,213,960,171,1080,154.7C1200,139,1320,149,1380,154.7L1440,160L1440,320L0,320Z">
            </path>
        </svg>
    </div>
</section>

<section class="filtros-container">
    <div class="container">
        <div class="filtros-card">
            <div class="filtros-wrapper">
                <div class="filtro-grupo">
                    <label>Espécie</label>
                    <div class="select-custom">
                        <select [(ngModel)]="filtroEspecie" (change)="filtrar()">
                            <option value="">Todas as espécies</option>
                            <option value="Cachorro">Cachorros</option>
                            <option value="Gato">Gatos</option>
                        </select>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <label>Porte</label>
                    <div class="select-custom">
                        <select [(ngModel)]="filtroPorte" (change)="filtrar()">
                            <option value="">Todos os tamanhos</option>
                            <option value="Pequeno">Pequeno</option>
                            <option value="Médio">Médio</option>
                            <option value="Grande">Grande</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="btn-limpar-filtros" (click)="limparFiltros()">
                    Limpar Filtros
                </button>
            </div>
        </div>
    </div>
</section>

<div class="vitrine-body">
    <div class="container">
        <div *ngIf="carregando" class="loading-state">
            <p>Carregando pets...</p>
        </div>

        <div class="grid-vitrine" *ngIf="!carregando && listaPetsFiltrados.length > 0">
            <div class="card-pet" *ngFor="let pet of listaPetsFiltrados; trackBy: trackByPet">
                <div class="card-img">
                    <img [src]="getImagem(pet.imagem)" [alt]="pet.nome" loading="lazy">
                    <span class="tag-status" [class.tag-disponivel]="pet.status === 'Disponível'"
                        [class.tag-adotado]="pet.status === 'Adotado'">
                        {{ pet.status }}
                    </span>
                </div>

                <div class="card-info">
                    <div class="badge-row">
                        <span class="badge badge-blue">{{ pet.especie }}</span>
                        <span class="badge badge-orange">{{ pet.porte }}</span>
                    </div>

                    <h3>{{ pet.nome }}</h3>
                    <p class="detalhes">{{ pet.sexo }} • {{ pet.idade }} {{ pet.unidadeIdade || 'ano(s)' }}</p>
                    <p class="descricao">{{ pet.descricao }}</p>

                    <button type="button" class="btn-adotar" [routerLink]="['/detalhes-pet', pet.id]">
                        Quero Adotar
                    </button>
                </div>
            </div>
        </div>

        <div class="loading-state" *ngIf="!carregando && listaPetsFiltrados.length === 0">
            <p>Nenhum pet encontrado com esses filtros.</p>
            <button type="button" class="btn-limpar" (click)="limparFiltros()">
                Ver todos os animais
            </button>
        </div>
    </div>
</div>
